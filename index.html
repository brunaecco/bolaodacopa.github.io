<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bolão Copa 2026">
<title>Bolão Copa 2026 ⚽</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#FF2D55;--blue:#0A84FF;--gold:#FFD60A;--dark:#0D0D1A;
  --card:#16162A;--card2:#1E1E38;--border:rgba(255,255,255,0.09);
  --green:#30D158;--purple:#BF5AF2;--orange:#FF9F0A;
}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--dark);position:relative}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(145deg,#0D0D2E 0%,#1A1060 40%,#0D1A3E 100%);
  padding:18px 16px 14px;
  position:relative;overflow:hidden;
}
.hdr::before{
  content:'⚽';font-size:120px;position:absolute;right:-20px;top:-20px;
  opacity:.04;line-height:1;
}
.hdr-confetti{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(circle at 15% 50%,rgba(255,45,85,.18) 0%,transparent 50%),
    radial-gradient(circle at 85% 20%,rgba(10,132,255,.2) 0%,transparent 50%),
    radial-gradient(circle at 50% 100%,rgba(255,214,10,.12) 0%,transparent 60%);
  pointer-events:none;
}
.hdr-inner{position:relative;z-index:1}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr-logo{display:flex;align-items:center;gap:12px}
.logo-circle{
  width:50px;height:50px;
  background:linear-gradient(135deg,#FFD60A,#FF9F0A);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:12px;color:#000;
  text-align:center;line-height:1.2;
  box-shadow:0 0 24px rgba(255,214,10,.4),0 4px 12px rgba(0,0,0,.4);
  flex-shrink:0;
}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;
  background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;margin-top:1px}
.hdr-flags{display:flex;gap:4px;font-size:18px}

/* ── COUNTDOWN ── */
.cd{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:10px 14px;
  backdrop-filter:blur(10px);
}
.cd-lbl{font-size:10px;color:rgba(255,214,10,.8);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:800}
.cd-row{display:flex;gap:6px;align-items:center}
.cd-u{
  background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:5px 8px;min-width:48px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.cd-n{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1}
.cd-l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.cd-sep{font-family:'Bebas Neue',sans-serif;font-size:22px;color:rgba(255,214,10,.4)}

/* ── NAV ── */
.nav{
  display:flex;background:rgba(13,13,26,.95);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(20px);
}
.nav::-webkit-scrollbar{display:none}
.nb{
  flex:none;padding:11px 14px;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;
  color:rgba(255,255,255,.38);background:none;border:none;
  cursor:pointer;border-bottom:3px solid transparent;
  white-space:nowrap;transition:all .2s;
}
.nb.on{color:#fff;border-bottom-color:var(--gold)}
.nb.on .nb-ico{filter:none}

/* ── CONTENT ── */
.content{padding:14px 14px 100px}

/* ── SECTION TITLE ── */
.stitle{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;
  color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.stitle-pill{
  background:linear-gradient(90deg,var(--gold),var(--orange));
  color:#000;font-size:10px;font-weight:900;letter-spacing:1px;
  padding:3px 9px;border-radius:20px;font-family:'Nunito',sans-serif;
}

/* ── INFO BOX ── */
.infobox{
  background:linear-gradient(135deg,rgba(255,214,10,.08),rgba(255,159,10,.06));
  border:1px solid rgba(255,214,10,.2);
  border-radius:12px;padding:10px 13px;
  font-size:12px;color:rgba(255,255,255,.65);
  line-height:1.7;margin-bottom:12px;
}

/* ── SYNC BAR ── */
.syncbar{
  background:linear-gradient(90deg,rgba(48,209,88,.08),rgba(48,209,88,.04));
  border:1px solid rgba(48,209,88,.2);
  border-radius:10px;padding:8px 12px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.6);font-weight:600;
}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.spin{animation:pulse 1s infinite}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.sync-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:6px;color:rgba(255,255,255,.5);font-size:11px;font-weight:700;
  padding:3px 9px;cursor:pointer;font-family:'Nunito',sans-serif;margin-left:auto;flex-shrink:0;
}

/* ── GROUP FILTER ── */
.gfilter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.gfbtn{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;cursor:pointer;
  color:rgba(255,255,255,.45);font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:1px;transition:all .15s;
}
.gfbtn.on{
  background:linear-gradient(135deg,rgba(10,132,255,.3),rgba(10,132,255,.15));
  border-color:var(--blue);color:#fff;
  box-shadow:0 0 12px rgba(10,132,255,.2);
}

/* ── GROUP CARD ── */
.gc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;margin-bottom:10px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.gh{
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,rgba(10,132,255,.2),rgba(10,132,255,.05));
  border-bottom:1px solid rgba(10,132,255,.15);
}
.gname{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold)}
.gstatus{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ghdr2{display:flex;padding:4px 14px;border-bottom:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.2)}
.ghdr2 span{font-size:8px;color:rgba(255,255,255,.25);font-weight:800;letter-spacing:1px;text-transform:uppercase;text-align:center}
.tr{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.tr:last-child{border-bottom:none}
.tr.q{background:linear-gradient(90deg,rgba(48,209,88,.06),transparent)}
.tr:hover{background:rgba(255,255,255,.03)}
.tpos{font-size:12px;color:rgba(255,255,255,.2);width:14px;font-weight:900}
.tflag{font-size:22px;line-height:1;width:26px;text-align:center}
.tname{flex:1;font-size:13px;font-weight:700}
.tcol{font-size:12px;font-weight:800;width:22px;text-align:center}
.qdot{
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),#00A040);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;flex-shrink:0;
  box-shadow:0 0 8px rgba(48,209,88,.4);
}

/* ── TABS MINI ── */
.tabs2{display:flex;gap:6px;margin-bottom:12px}
.tab2{
  flex:1;padding:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:rgba(255,255,255,.4);
  font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  text-align:center;cursor:pointer;transition:all .18s;
}
.tab2.on{
  background:linear-gradient(135deg,rgba(10,132,255,.25),rgba(10,132,255,.1));
  border-color:var(--blue);color:#fff;
  box-shadow:0 0 14px rgba(10,132,255,.15);
}

/* ── MATCH CARD ── */
.mc{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 13px;margin-bottom:7px;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  transition:transform .15s;
}
.mc:hover{transform:translateY(-1px)}
.mdate{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:7px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-weight:700}
.mteams{display:flex;align-items:center;gap:6px}
.mteam{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.mteam.r{flex-direction:row-reverse}
.mtn{font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:85px}
.mflag{font-size:24px;line-height:1;flex-shrink:0}
.mscore{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:var(--gold);min-width:52px;text-align:center;letter-spacing:3px;flex-shrink:0;
}
.mscore.tbd{font-size:13px;color:rgba(255,255,255,.15);font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:0}
.badge-ft{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px}
.badge-live{background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:2px;animation:pulse 1s infinite}
.badge-ns{background:rgba(255,214,10,.1);color:rgba(255,214,10,.6);font-size:8px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:1px}

/* ── BET CARD ── */
.betcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:10px;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.bethdr{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.betphase{font-size:9px;color:var(--gold);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.bettitle{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:800;flex-wrap:wrap}
.betvs{font-size:11px;color:rgba(255,255,255,.2);font-weight:900}
.betbody{padding:11px 14px}
.scorerow{display:flex;align-items:center;gap:8px}
.sinp{
  background:var(--card2);border:2px solid rgba(255,255,255,.1);
  border-radius:10px;color:var(--gold);
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  width:54px;text-align:center;padding:4px;outline:none;
  transition:border-color .2s;
}
.sinp:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(255,214,10,.2)}
.ssep{font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,.15)}

/* ── QUALIFIER OPTION ── */
.qopt{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;background:var(--card2);
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;cursor:pointer;margin-bottom:6px;
  transition:all .18s;
}
.qopt:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
.qopt.sel{
  border-color:var(--green);
  background:linear-gradient(90deg,rgba(48,209,88,.12),rgba(48,209,88,.05));
  box-shadow:0 0 12px rgba(48,209,88,.15);
}
.chk{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;transition:all .18s;
}
.qopt.sel .chk{background:var(--green);border-color:var(--green);color:#000}
.qflag{font-size:24px;line-height:1}
.qname{font-size:13px;font-weight:700;flex:1}
.q-avanca{
  font-size:9px;font-weight:800;color:var(--green);
  letter-spacing:1px;background:rgba(48,209,88,.1);
  border:1px solid rgba(48,209,88,.25);border-radius:4px;
  padding:2px 6px;
}

/* ── SAVE BTN ── */
.savebtn{
  width:100%;
  background:linear-gradient(90deg,#0A84FF,#0066CC);
  border:none;color:#fff;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;
  letter-spacing:1px;padding:14px;border-radius:12px;
  cursor:pointer;margin-top:8px;
  box-shadow:0 4px 20px rgba(10,132,255,.35);
  transition:all .18s;
}
.savebtn:hover{box-shadow:0 6px 24px rgba(10,132,255,.5);transform:translateY(-1px)}
.savebtn:active{transform:translateY(0);opacity:.9}

/* ── PLAYER CARD ── */
.pcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:11px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:11px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  transition:transform .15s;
}
.pcard:hover{transform:translateX(2px)}
.pname{flex:1;font-size:14px;font-weight:800}
.delbtn{
  background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.25);
  color:rgba(255,45,85,.7);border-radius:7px;padding:4px 10px;
  font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;
}
.delbtn:hover{background:rgba(255,45,85,.2);color:var(--red)}

/* ── ADD FORM ── */
.addform{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:14px;margin-bottom:14px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.ftitle{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px}
.frow{display:flex;gap:8px}
.finp{
  background:var(--card2);border:1.5px solid rgba(255,255,255,.1);
  border-radius:10px;color:#fff;font-size:14px;font-weight:600;
  padding:9px 12px;flex:1;font-family:'Nunito',sans-serif;outline:none;
  transition:border-color .2s;
}
.finp:focus{border-color:var(--blue)}
.addbtn{
  background:linear-gradient(135deg,var(--blue),#0066CC);
  border:none;color:#fff;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:900;padding:9px 16px;
  border-radius:10px;cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 12px rgba(10,132,255,.3);
}

/* ── SCOREBOARD ── */
.sbar{height:4px;background:rgba(255,214,10,.1);border-radius:3px;margin-top:4px;overflow:hidden}
.sbarfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:3px;transition:width .6s ease}
.ppts{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold)}
.pptsl{font-size:9px;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:1px;margin-top:-4px}

/* ── RANK CARD ── */
.rank-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.rank-row{
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s;
}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:rgba(255,255,255,.02)}
.rank-row.first{background:linear-gradient(90deg,rgba(255,214,10,.08),transparent)}
.rank-row.second{background:linear-gradient(90deg,rgba(192,192,192,.06),transparent)}
.rank-row.third{background:linear-gradient(90deg,rgba(205,127,50,.06),transparent)}

/* ── ROUND LABEL ── */
.rlbl{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
  color:rgba(255,255,255,.35);margin-bottom:8px;margin-top:16px;
  display:flex;align-items:center;gap:8px;
}
.rlbl:first-child{margin-top:0}
.rlbl::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(255,255,255,.08),transparent)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,.25)}
.empty .ico{font-size:48px;margin-bottom:10px;display:block}
.empty p{font-size:13px;font-weight:600;line-height:1.7}

/* ── PLAYER PILL (apostas) ── */
.ppill{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:20px;padding:5px 12px;cursor:pointer;color:#fff;
  font-size:12px;font-weight:700;transition:all .18s;white-space:nowrap;
}
.ppill.on{
  background:linear-gradient(90deg,rgba(10,132,255,.25),rgba(10,132,255,.1));
  border-color:var(--blue);
  box-shadow:0 0 12px rgba(10,132,255,.2);
}
.pdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ── ADMIN INPUT ── */
.ainp{
  width:46px;background:var(--card2);border:1.5px solid rgba(255,255,255,.1);
  border-radius:7px;color:#fff;font-size:13px;font-weight:700;
  padding:5px 5px;text-align:center;font-family:'Nunito',sans-serif;outline:none;
}
.ainp:focus{border-color:var(--blue)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  color:#fff;font-size:13px;font-weight:800;
  padding:9px 22px;border-radius:24px;z-index:999;
  pointer-events:none;white-space:nowrap;
  animation:tup .3s ease;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.ok{background:linear-gradient(90deg,#1A7A3A,#00A040)}
.toast.err{background:linear-gradient(90deg,#A01020,var(--red))}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── LOADING ── */
.loading-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:20px;background:var(--dark);
}
.spinner{
  width:48px;height:48px;
  border:3px solid rgba(255,214,10,.15);
  border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase}
.loading-ball{font-size:36px;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}

/* ── MISC ── */
.gname-big{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold)}
.save-ok-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(48,209,88,.15);border:1px solid rgba(48,209,88,.3);color:var(--green);font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:1px}
</style>
</head>
<body>
<div id="root"></div>
<script defer src="./app.js"></script>
</body>
</html>
